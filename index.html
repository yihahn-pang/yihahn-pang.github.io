                    colors: {
                        'accent': '#ffffff',

                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },

        body {

        /* --- Background Wrapper --- */
        .bg-fixed-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
            overflow: hidden;
        }
        
        #snow-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }

            width: 100%;
            height: 100%;
            object-fit: cover;
            background-image: url('background.jpg');
            background-size: cover;
            background-position: center;
        }
        
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(15, 23, 42, 0.9) 0%, rgba(15, 23, 42, 0.6) 50%, rgba(15, 23, 42, 0.3) 100%);

            pointer-events: none;
        }

        /* --- Animations & Interactions --- */
        .nav-link {
            position: relative;
            padding-bottom: 2px;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: 0;
            left: 0;
            background-color: white;
            transition: width 0.3s ease-in-out;
        }
        .nav-link:hover::after {
            width: 100%;
        }

        /* Tab Buttons */
        .tab-btn {
            position: relative;
            transition: color 0.3s ease;
        }
        .tab-content {
            display: none;
            animation: fadeInUp 0.4s ease-out forwards;
        }

        .reveal-on-scroll {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s cubic-bezier(0.5, 0, 0, 1);
        }
        .reveal-on-scroll.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .tilt-card {
            transition: transform 0.1s ease, box-shadow 0.3s ease;
            transform-style: preserve-3d;
        }
        .tilt-card:hover {
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            z-index: 10;
        }

        .social-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .social-btn::before {
            content: '';
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            transition: top 0.3s ease;
            z-index: -1;
        }
        .social-btn:hover::before {
            top: 0;
        }
        .social-btn:hover {
            color: #0f172a;
        }
    </style>
</head>

        function switchTab(tabId) {
            // Hide all tab contents
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.style.display = 'none';
            });
            // Reset all tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('border-white', 'text-white');
                btn.classList.add('border-transparent', 'text-white/50');
            });

            // Show selected tab content
            document.getElementById(tabId).style.display = 'block';
            
            // Highlight active button
            const activeBtn = document.getElementById('tab-btn-' + tabId);
            activeBtn.classList.remove('border-transparent', 'text-white/50');
            activeBtn.classList.add('border-white', 'text-white');

            // Trigger stagger animation for inner elements
            const elements = document.getElementById(tabId).querySelectorAll('.reveal-on-scroll');
            elements.forEach(el => el.classList.remove('is-visible'));
            
            setTimeout(() => {
                elements.forEach((el, index) => {
                    setTimeout(() => {
                        el.classList.add('is-visible');
                    }, index * 100);
                });
            }, 50);
        }

        function scrollToSection(id) {
            const tabs = ['experience', 'skills', 'projects', 'education'];

                // Scroll to the tab menu bar

            } else {
                // Scroll to standard sections (e.g. About)

                if (el) window.scrollTo({ top: el.offsetTop, behavior: 'smooth' });
            }

        // Snow Canvas Setup
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, snowflakes = [];

        function resizeAndInit() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            snowflakes = [];
            for (let i = 0; i < 100; i++) {
                snowflakes.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 2 + 1,
                    speed: Math.random() * 1 + 0.5,
                    wind: Math.random() * 0.5 - 0.25
                });
            }
        }

        function drawSnow() {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.beginPath();
            for (let flake of snowflakes) {
                ctx.moveTo(flake.x, flake.y);
                ctx.arc(flake.x, flake.y, flake.radius, 0, Math.PI * 2);
                
                flake.y += flake.speed;
                flake.x += flake.wind;
                if (flake.y > height) {
                    flake.y = 0;
                    flake.x = Math.random() * width;
                }
            }
            ctx.fill();
            requestAnimationFrame(drawSnow);
        }

        window.addEventListener('resize', resizeAndInit);
        resizeAndInit();
        drawSnow();

        // Standard Scroll Observer for About Section
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) entry.target.classList.add('is-visible');
                });
            }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });
            
            // Only observe non-tab items on generic scroll
            document.querySelectorAll('#about .reveal-on-scroll').forEach(el => observer.observe(el));
        });

        // 3D Tilt Effect for Project Cards
        document.querySelectorAll('.tilt-card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const rotateX = ((y - rect.height / 2) / (rect.height / 2)) * -5;
                const rotateY = ((x - rect.width / 2) / (rect.width / 2)) * 5;
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale(1)';
            });
        });
    </script>
</body>
</html>
