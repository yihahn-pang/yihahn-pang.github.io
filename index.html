                        'glow': 'glow 3s ease-in-out infinite alternate',

                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-15px)' },

                            '0%': { opacity: '0', transform: 'translateX(-50px)' },
                            '100%': { opacity: '1', transform: 'translateX(0)' },
                        },
                        slideInRight: {
                            '0%': { opacity: '0', transform: 'translateX(50px)' },
                            '100%': { opacity: '1', transform: 'translateX(0)' },

    <style>
        body {
            background-color: #020617; /* Slate 950 */
            color: #f8fafc;
            overflow-x: hidden;
            cursor: default;
        }

        /* --- Background Effects --- */
        .bg-fixed-wrapper {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -3; overflow: hidden;
            background: radial-gradient(circle at 15% 50%, rgba(15, 23, 42, 1), #020617 50%);
        }
        
        #snow-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2; pointer-events: none; opacity: 0.5;
        }

        /* --- Glass & Interactions --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1rem;
        }

        .nav-link {
            position: relative;
            padding-bottom: 4px;
            color: rgba(255,255,255,0.7);
            transition: color 0.3s ease;
        }
        .nav-link:hover { color: white; }
        .nav-link::after {
            content: ''; position: absolute; width: 0; height: 2px;
            bottom: 0; left: 0; background-color: #38bdf8;
            transition: width 0.3s ease-in-out;
        }
        .nav-link:hover::after { width: 100%; }

        .reveal-on-scroll {
            opacity: 0; transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal-on-scroll.is-visible {
            opacity: 1; transform: translateY(0);
        }

        .tilt-card {
            transition: transform 0.1s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            transform-style: preserve-3d;
        }
        .tilt-card:hover {
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px rgba(56, 189, 248, 0.1);
            border-color: rgba(56, 189, 248, 0.3);
            z-index: 10;
        }

        .social-btn {
            position: relative; overflow: hidden;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.05);
        }
        .social-btn:hover {
            background: #38bdf8;
            color: #020617;
            border-color: #38bdf8;
            transform: translateY(-3px);
        }

        .badge-marquee-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .badge-marquee-container img {
            height: 28px;
            border-radius: 4px;
            transition: transform 0.2s ease;
        }
        .badge-marquee-container img:hover {
            transform: scale(1.1);
        }
    </style>
</head>

        function scrollToSection(id) {
            const el = document.getElementById(id);
            if (el) window.scrollTo({ top: el.offsetTop - 80, behavior: 'smooth' });
        }

        // Snow/Particle Canvas Setup
        const canvas = document.getElementById('snow-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles = [];

        function resizeAndInit() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            
            particles = [];
            for (let i = 0; i < 70; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    radius: Math.random() * 1.5 + 0.5,
                    speedY: Math.random() * 0.5 + 0.1,
                    speedX: Math.random() * 0.5 - 0.25,
                    opacity: Math.random() * 0.5 + 0.1
                });
            }
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            for (let p of particles) {
                ctx.fillStyle = `rgba(148, 163, 184, ${p.opacity})`;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
                
                p.y -= p.speedY; // Floating up instead of snowing down for a tech vibe
                p.x += p.speedX;
                
                if (p.y < 0) {
                    p.y = height;
                    p.x = Math.random() * width;
                }
                if (p.x > width || p.x < 0) {
                    p.speedX = -p.speedX;
                }
            }
            requestAnimationFrame(drawParticles);
        }

        window.addEventListener('resize', resizeAndInit);
        resizeAndInit();
        drawParticles();

        // Intersection Observer for scroll reveal
        document.addEventListener('DOMContentLoaded', () => {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                        observer.unobserve(entry.target); // Run once
                    }
                });
            }, { threshold: 0.1, rootMargin: "0px 0px -50px 0px" });
            
            document.querySelectorAll('.reveal-on-scroll').forEach(el => observer.observe(el));
        });

        // 3D Tilt Effect
        document.querySelectorAll('.tilt-card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const rotateX = ((y - rect.height / 2) / (rect.height / 2)) * -4;
                const rotateY = ((x - rect.width / 2) / (rect.width / 2)) * 4;
                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) scale(1)';
            });
        });
    </script>
</body>
</html>
